# Nginx site config for hvac.muskit.in (Hostinger VPS KVM 2).
#
# Install:
#   sudo cp deploy/nginx-hvac.muskit.in.conf /etc/nginx/sites-available/hvac.muskit.in
#   sudo ln -sf /etc/nginx/sites-available/hvac.muskit.in /etc/nginx/sites-enabled/hvac.muskit.in
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d hvac.muskit.in --redirect --agree-tos -m you@example.com -n
#
# Assumes the app container exposes port 3000 on 127.0.0.1 (see docker-compose.yml).
#
# Performance-tune for KVM 2: keep gzip moderate, cache static assets aggressively.

# --- HTTP → ACME challenge + HTTPS redirect ------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name hvac.muskit.in www.hvac.muskit.in;

    # Let's Encrypt http-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://hvac.muskit.in$request_uri;
    }
}

# --- HTTPS production server --------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hvac.muskit.in;

    # TLS — certbot fills these in on first run.
    ssl_certificate     /etc/letsencrypt/live/hvac.muskit.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvac.muskit.in/privkey.pem;

    # Modern TLS only — disable TLS 1.0 / 1.1 / weak ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS, frame, content-type, referrer, permissions
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Limit upload sizes (project payloads + AI design payloads)
    client_max_body_size 16M;

    # Gzip for text + JSON; brotli not assumed installed on stock Nginx
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml application/xml font/ttf;

    # ---------- Application ------------------------------------------------
    # Long-running AI endpoints — give them up to 5 min.
    location ~ ^/api/ai/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
        proxy_buffering    off;
    }

    # Static asset cache — engineeringCore.js, costingEngine.js, etc. rarely
    # change between deploys. Browser-cache for 1h, nginx-cache passthrough.
    location ~* \.(?:js|css|svg|woff2?|ttf|eot|png|jpg|jpeg|gif|ico)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        add_header         Cache-Control     "public, max-age=3600, stale-while-revalidate=86400" always;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 90s;
    }

    # Block dot-files except ACME well-known
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/hvac.muskit.in.access.log;
    error_log  /var/log/nginx/hvac.muskit.in.error.log warn;
}
