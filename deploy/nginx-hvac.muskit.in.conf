# Nginx site config for hvac.muskit.in
#
# Drop in at /etc/nginx/sites-available/hvac.muskit.in.conf and symlink:
#   sudo ln -s /etc/nginx/sites-available/hvac.muskit.in.conf \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d hvac.muskit.in
#   sudo systemctl reload nginx
#
# Assumes the app container exposes port 3000 on 127.0.0.1.

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name hvac.muskit.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hvac.muskit.in;

    # certbot will populate these:
    ssl_certificate     /etc/letsencrypt/live/hvac.muskit.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvac.muskit.in/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 16M;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 90s;
    }

    # Long-running AI endpoints — give them extra time
    location ~ ^/api/ai/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
    }

    # Block hidden files except .well-known (for certbot)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
