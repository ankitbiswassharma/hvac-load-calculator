# Production-style stack for hvac.muskit.in
#
#   app  — Node 20 server (the HVAC platform)
#   db   — Postgres 16 for persistent project / user storage
#
# Bring up:  docker compose up -d
# Stop:      docker compose down
# Logs:      docker compose logs -f app
#
# Required .env keys:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   DATABASE_URL  (e.g. postgres://hvac:hvac@db:5432/hvac)
#   OPENAI_API_KEY (optional)
#   SMTP_*         (optional)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hvac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hvac}
      POSTGRES_DB: ${POSTGRES_DB:-hvac}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hvac} -d ${POSTGRES_DB:-hvac}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://hvac:hvac@db:5432/hvac}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - appdata:/app/server-data

volumes:
  pgdata:
  appdata:
