name: Deploy to hvac.muskit.in

# Triggered manually OR on push to main after CI passes.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image tag
        run: |
          tag="ghcr.io/${{ github.repository_owner }}/hvac-muskit:${{ github.sha }}"
          echo "tags=$tag" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository_owner }}/hvac-muskit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy → production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pull & restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/hvac
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/hvac-muskit:latest
            docker compose up -d --no-deps app
            docker image prune -f
            curl -fsS http://127.0.0.1:3000/ > /dev/null
            echo "Deploy OK"
