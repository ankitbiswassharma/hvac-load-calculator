name: Deploy to hvac.muskit.in

# Manual dispatch OR push to main. The test job below is a hard gate:
# nothing is built or shipped unless the full suite passes first.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: Test gate (must pass before deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run unit tests
        run: npm test

      - name: Energy CLI smoke test
        run: |
          echo '{"system_data":{"peak_load_kw":40,"design_outdoor_temp_c":42,"indoor_setpoint_c":24,"conditioned_airflow_cfm":4500,"process_airflow_cfm":800,"peak_conditioned_fan_kw":3.2,"process_fan_static_pa":220,"tariff_per_kwh":8.5}}' \
            | python -m engine.energy.cli simulate \
            | python -c "import json,sys; r=json.load(sys.stdin); assert r['ok'] is True and r['report']['annual_energy_kwh'] > 0; print('cli ok')"

  build-and-push:
    name: Build & push image to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image tag
        run: |
          tag="ghcr.io/${{ github.repository_owner }}/hvac-muskit:${{ github.sha }}"
          echo "tags=$tag" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository_owner }}/hvac-muskit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy → production
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment: production
    steps:
      - name: Pull & restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/hvac
            image="ghcr.io/${{ github.repository_owner }}/hvac-muskit:latest"
            traefik_project_dir="${TRAEFIK_PROJECT_DIR:-/home/webapp/app}"
            traefik_network="${TRAEFIK_NETWORK:-app_default}"
            traefik_dynamic_dir="${TRAEFIK_DYNAMIC_DIR:-${traefik_project_dir}/traefik/dynamic}"
            wait_for_url() {
              url="$1"
              for attempt in $(seq 1 30); do
                if curl -fsS "$url" > /dev/null; then
                  return 0
                fi
                echo "Waiting for ${url} (${attempt}/30)"
                sleep 2
              done
              curl -fsS "$url" > /dev/null
            }
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "$image"
            docker tag "$image" hvac-muskit:local
            docker compose up -d --no-deps --force-recreate app
            container_id="$(docker compose ps -q app)"
            if [ -z "$container_id" ]; then
              echo "Could not find the HVAC app container from docker compose ps." >&2
              exit 1
            fi
            docker network connect "$traefik_network" "$container_id" 2>/dev/null || true
            docker network connect "$traefik_network" hvac-app 2>/dev/null || true
            if [ -d "$traefik_dynamic_dir" ] && [ -f deploy/traefik/dynamic/hvac.yml ]; then
              cp deploy/traefik/dynamic/hvac.yml "$traefik_dynamic_dir/hvac.yml"
            fi
            if [ -f "$traefik_project_dir/docker-compose.yml" ]; then
              docker compose -f "$traefik_project_dir/docker-compose.yml" restart traefik
            fi
            docker image prune -f
            wait_for_url http://127.0.0.1:3000/
            wait_for_url https://hvac.muskit.in/
            echo "Deploy OK"
